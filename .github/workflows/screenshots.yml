name: Screenshots

# Regenerate the demo README screenshots (menu, settings) whenever the TUI or the generator
# changes, and commit them back. docs/dashboard.svg is a real DVGA scan capture committed by
# hand: CI has no run checkpoint to render it from, so it is deliberately left untouched here.
# Also runnable on demand from the Actions tab.
on:
  push:
    branches: [main]
    paths:
      - 'gradientql/tui.py'
      - 'scripts/generate_screenshots.py'
      - '.github/workflows/screenshots.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: screenshots-${{ github.ref }}
  cancel-in-progress: true

jobs:
  screenshots:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        # tui.py also imports gradientql.core.config (for the placeholder-URL guard) -> pyyaml
        run: pip install "textual>=7,<8" "rich>=13" "pyyaml>=6.0"

      - name: Generate screenshots
        run: python scripts/generate_screenshots.py
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/menu.svg docs/settings.svg
          if git diff --cached --quiet; then
            echo "Screenshots unchanged."
          else
            git commit -m "Regenerate TUI screenshots [skip ci]"
            git push
          fi
